# Local stack for the document-processing pipeline.
#
#   docker compose up --build
#
# Scale a stage independently, e.g. run 3 classifier workers:
#   docker compose up --build --scale classifier=3
#
# All services share one Postgres (durable state) and one Redis (message broker).

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: docpipe
      POSTGRES_PASSWORD: docpipe
      POSTGRES_DB: docpipe
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U docpipe"]
      interval: 3s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 20

  api:
    build: .
    command: ["api"]
    environment:
      POSTGRES_DSN: postgres://docpipe:docpipe@postgres:5432/docpipe?sslmode=disable
      REDIS_ADDR: redis:6379
      HTTP_ADDR: ":8080"
      # Outbox relay cadence + fast PEL reclaim so partial reruns resume promptly.
      OUTBOX_POLL_INTERVAL: "${OUTBOX_POLL_INTERVAL:-1s}"
      CLAIM_MIN_IDLE: "${CLAIM_MIN_IDLE:-5s}"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  extractor:
    build: .
    command: ["extractor"]
    environment:
      POSTGRES_DSN: postgres://docpipe:docpipe@postgres:5432/docpipe?sslmode=disable
      REDIS_ADDR: redis:6379
      WORKER_CONCURRENCY: "4"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  classifier:
    build: .
    command: ["classifier"]
    environment:
      POSTGRES_DSN: postgres://docpipe:docpipe@postgres:5432/docpipe?sslmode=disable
      REDIS_ADDR: redis:6379
      WORKER_CONCURRENCY: "4"
      CLAIM_MIN_IDLE: "${CLAIM_MIN_IDLE:-5s}"
      # Simulated per-token latency for the mock classifier. Makes progress and
      # partial-rerun visible in the demo; set to 0 for maximum throughput.
      MOCK_CLASSIFY_DELAY: "${MOCK_CLASSIFY_DELAY:-120ms}"
      # Classification backend. Default is the deterministic mock (no keys needed).
      # To use real Ollama, set these (e.g. in a .env file or your shell):
      LLM_PROVIDER: "${LLM_PROVIDER:-mock}"
      OLLAMA_BASE_URL: "${OLLAMA_BASE_URL:-https://ollama.com}"
      OLLAMA_API_KEY: "${OLLAMA_API_KEY:-}"
      OLLAMA_MODEL: "${OLLAMA_MODEL:-gpt-oss:20b}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
